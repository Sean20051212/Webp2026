<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ex#9 - Flickr Photo Gallery</title>
  <style>
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      font-family: sans-serif;
      background: #111;
      color: #fff;
      padding: 20px;
    }

    h1 { margin-bottom: 16px; }

    button {
      padding: 10px 24px;
      font-size: 16px;
      cursor: pointer;
      background: #e45;
      color: white;
      border: none;
      border-radius: 6px;
      margin-bottom: 24px;
      transition: background 0.3s;
    }
    button:hover { background: #c23; }

    #status {
      margin-bottom: 16px;
      font-size: 14px;
      color: #aaa;
      min-height: 20px;
    }

    /* ── 照片牆 CSS（投影片 page 17） ── */
    .gallery {
      --g: 6px;
      display: grid;
      width: 1200px;
      max-width: 95vw;
      aspect-ratio: 1;
      grid: auto-flow 1fr / repeat(3, 1fr);
      gap: var(--g);
    }

    .gallery img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: grayscale(1);
      cursor: pointer;
      transition: .5s;
    }
    .gallery img:hover { filter: grayscale(0); }

    .gallery img:nth-child(2) {
      grid-area: 1/2 / span 2 / span 2;
      clip-path: polygon(
        0 0, 100% 0, 100% 100%,
        calc(50% + var(--g)/4) 100%,
        0 calc(50% - var(--g)/4)
      );
    }

    .gallery img:nth-child(3) {
      grid-area: 2/1 / span 2 / span 2;
      clip-path: polygon(
        0 0,
        calc(50% - var(--g)/4) 0,
        100% calc(50% + var(--g)/4),
        100% 100%,
        0 100%
      );
    }
  </style>
</head>
<body>

  <h1>ex#9 — Flickr Photo Gallery</h1>
  <button onclick="getimg()">Get IMG</button>
  <div id="status"></div>
  <div id="gallery" class="gallery"></div>

  <script src="ex9.js"></script>

</body>
</html>
