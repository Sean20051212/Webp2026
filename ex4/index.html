<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>資工選課表</title>
<style>
  body {
    font-family: sans-serif;
    margin: 20px;
  }
  h2 {
    font-family: sans-serif;
  }
  table {
    border-collapse: collapse;
    width: 80%;
    text-align: left;
    margin-bottom: 10px;
  }
  th, td {
    border: 1px solid #e0e0e0;
    padding: 12px 15px;
  }
  th {
    background-color: #27a768; 
    color: white;
    font-weight: bold;
  }
  tr:nth-child(even) {
    background-color: #f5f5f5; 
  }
  tr:nth-child(odd) {
    background-color: #ffffff; 
  }
  /* 讓課程名稱看起來像可以點擊的連結 */
  .course-link {
    color: #0056b3;
    text-decoration: underline;
    cursor: pointer;
  }
  .course-link:hover {
    color: #003d82;
  }
  button {
    padding: 5px 15px;
    font-size: 16px;
    cursor: pointer;
    margin-top: 10px;
  }

  /* === 懸浮視窗 (Modal) 的 CSS === */
  
  /* 遮罩背景：全螢幕、半透明黑 */
  .modal {
    display: none; 
    position: fixed; 
    z-index: 1000; 
    left: 0;
    top: 0;
    width: 100%;
    height: 100%;
    background-color: rgba(0, 0, 0, 0.5); 
  }

  /* 視窗主體：白色卡片 */
  .modal-content {
    background-color: #fff;
    margin: 5% auto; 
    padding: 20px;
    border-radius: 8px; 
    width: 70%; 
    height: 75vh; 
    position: relative;
    box-shadow: 0 4px 15px rgba(0,0,0,0.3);
  }

  /* 右上角關閉按鈕 */
  .close-btn {
    position: absolute;
    right: 20px;
    top: 10px;
    font-size: 28px;
    font-weight: bold;
    cursor: pointer;
    color: #aaa;
  }
  
  .close-btn:hover { 
    color: #333; 
  }

  /* 用來載入外部網頁的 iframe */
  #modalIframe {
    width: 100%;
    height: calc(100% - 30px); 
    border: none;
    margin-top: 15px;
  }
</style>
</head>
<body>

  <h2>資工選課表</h2>

  <table id="csie">
    <tr>
      <th>開課單位</th>
      <th>課程名稱</th>
      <th>授課教師</th>
    </tr>
    <!-- 1. 資料庫系統設計 -->
    <tr>
      <td>資工系</td>
      <td><span class="course-link" onclick="openPopover('https://catalog.cgu.edu.tw/coursedata?sectionid=A2345')">資料庫系統設計</span></td>
      <td>趙一平</td>
    </tr>
    <!-- 2. 資料結構與演算法(2) -->
    <tr>
      <td>資工系</td>
      <td><span class="course-link" onclick="openPopover('https://catalog.cgu.edu.tw/coursedata?sectionid=A2346')">資料結構與演算法(2)</span></td>
      <td>趙一平</td>
    </tr>
    <!-- 3. 系統程式 -->
    <tr>
      <td>資工系</td>
      <td><span class="course-link" onclick="openPopover('https://catalog.cgu.edu.tw/coursedata?sectionid=A2347')">系統程式</span></td>
      <td>黃崇源</td>
    </tr>
    <!-- 4. 網頁程式設計 -->
    <tr>
      <td>資工系</td>
      <td><span class="course-link" onclick="openPopover('https://catalog.cgu.edu.tw/coursedata?sectionid=A2348')">網頁程式設計</span></td>
      <td>吳齊人</td>
    </tr>
    <!-- 5. 機率與統計 -->
    <tr>
      <td>資工系</td>
      <td><span class="course-link" onclick="openPopover('https://catalog.cgu.edu.tw/coursedata?sectionid=A2350')">機率與統計</span></td>
      <td>呂仁園</td>
    </tr>
  </table>

  <button onclick="changeResult()">Change</button>

  <!-- === 懸浮視窗的 HTML 結構 === -->
  <div id="courseModal" class="modal">
    <div class="modal-content">
      <span class="close-btn" onclick="closeModal()">&times;</span>
      <iframe id="modalIframe" src=""></iframe>
    </div>
  </div>

  <script>
    // 更改第一列(rows[1])第三欄(cells[2])的授課教師
    function changeResult() {
      var myTable = document.getElementById("csie");
      myTable.rows[1].cells[2].innerHTML = "黃崇源";
    }

    // 打開懸浮視窗並載入網址
    function openPopover(url) {
      var modal = document.getElementById("courseModal");
      var iframe = document.getElementById("modalIframe");
      
      iframe.src = url;
      modal.style.display = "block";
    }

    // 關閉視窗並清空網址
    function closeModal() {
      var modal = document.getElementById("courseModal");
      var iframe = document.getElementById("modalIframe");
      
      modal.style.display = "none";
      iframe.src = "";
    }

    // 點擊黑底遮罩處關閉視窗
    window.onclick = function(event) {
      var modal = document.getElementById("courseModal");
      if (event.target == modal) {
        closeModal();
      }
    }


    function tree(n) {
        printTreeTop(n);
        printTreeBottom(n);
        }

        function printTreeTop(n) {
        for (let i = 1; i <= n; i++) {
            let spaces = n - i;
            let stars = i * 2 - 1;
            // 組合空白與星星並印出
            console.log(repeatchar(spaces, ' ') + repeatchar(stars, '*'));
        }
        }

        function printTreeBottom(n) {
            let trunk = ""; // 用一個變數來收集樹幹字串
            for (let i = 0; i < 3; i++) {
                // 每次迴圈都在結尾加上 \n (換行符號)
                trunk += repeatchar(n - 1, ' ') + '*\n';
            }
            // 用 trimEnd() 拔除字串最後面多出來的一個換行，然後一次印出
            console.log(trunk.trimEnd());
            }
        

        function repeatchar(n, arg_char) {
        let result = '';
        for (let i = 0; i < n; i++) {
            result += arg_char;
        }
        return result;
        }

        // 執行函數，畫出如圖片範例中 n=4 的聖誕樹
        tree(4);
  </script>

</body>
</html>
