<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>資工選課表</title>
<style>
  table {
    border-collapse: collapse;
    width: 100%;
    font-family: sans-serif;
    text-align: left;
  }
  th, td {
    border: 1px solid #e0e0e0;
    padding: 12px 15px;
  }
  th {
    background-color: #55a868; /* Green header background */
    color: white;
    font-weight: bold;
  }
  tr:nth-child(even) {
    background-color: #f5f5f5; /* Light gray for even rows */
  }
  tr:nth-child(odd) {
    background-color: #ffffff; /* White for odd rows */
  }
  h2 {
    font-family: sans-serif;
  }
</style>
</head>
<body>

    </tr>
    <tr>

    <tr>

</html>
